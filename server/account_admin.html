<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CatsCo Account Admin</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0f1520;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #d6a84f;
      --accent-2: #f0c96b;
      --danger: #ff7b72;
      --ok: #3fb950;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(980px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(63, 185, 80, 0.32);
      border-radius: 999px;
      color: var(--ok);
      background: rgba(63, 185, 80, 0.08);
      white-space: nowrap;
      font-weight: 650;
    }

    section {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 22px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      letter-spacing: 0;
    }

    form {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(214, 168, 79, 0.16);
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--accent);
      color: #111827;
      font-weight: 750;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-2);
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .result {
      display: none;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .result.visible {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.015);
    }

    .row:first-child {
      border-top: 0;
    }

    .label {
      color: var(--muted);
    }

    .value {
      overflow-wrap: anywhere;
    }

    .error {
      display: none;
      margin-top: 14px;
      color: var(--danger);
    }

    .error.visible {
      display: block;
    }

    code {
      display: block;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      overflow-x: auto;
    }

    @media (max-width: 640px) {
      main {
        width: min(100vw - 24px, 980px);
        padding: 28px 0;
      }

      header,
      form {
        display: block;
      }

      .badge,
      button {
        margin-top: 12px;
      }

      button {
        width: 100%;
      }

      .row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CatsCo Account Admin</h1>
        <p>本页面只用于 SSH 隧道后的本机管理，不走公网入口。</p>
      </div>
      <div class="badge">Local only</div>
    </header>

    <section>
      <h2>按 UID 查询账号</h2>
      <form id="lookup-form">
        <input id="uid" name="uid" inputmode="numeric" autocomplete="off" placeholder="输入用户 UID，例如 2" />
        <button id="lookup-button" type="submit">查询</button>
      </form>
      <div class="hint">第一版先做只读查询，避免后台误操作；service token 仍从服务端环境变量配置。</div>
      <div id="error" class="error"></div>
      <div id="result" class="result" aria-live="polite"></div>
    </section>

    <section>
      <h2>访问方式</h2>
      <p>在本机建立 SSH 隧道后访问下面的本地地址：</p>
      <code>ssh -L 26061:127.0.0.1:26061 &lt;server-alias&gt;
http://127.0.0.1:26061/local/account-admin</code>
    </section>
  </main>

  <script>
    const form = document.querySelector('#lookup-form');
    const uidInput = document.querySelector('#uid');
    const button = document.querySelector('#lookup-button');
    const result = document.querySelector('#result');
    const error = document.querySelector('#error');

    function showError(message) {
      error.textContent = message;
      error.classList.add('visible');
      result.classList.remove('visible');
      result.innerHTML = '';
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === '') return '-';
      return escapeHTML(value);
    }

    function row(label, value) {
      return `<div class="row"><div class="label">${label}</div><div class="value">${formatValue(value)}</div></div>`;
    }

    function render(payload) {
      const user = payload.user || {};
      const accountCenter = payload.account_center || {};
      result.innerHTML = [
        row('UID', user.uid),
        row('用户名', user.username),
        row('邮箱', user.email),
        row('显示名', user.display_name),
        row('头像', user.avatar_url),
        row('账号类型', user.account_type),
        row('状态', user.state),
        row('创建时间', user.created_at),
        row('Service Token', accountCenter.service_tokens_configured ? '已配置' : '未配置'),
      ].join('');
      error.classList.remove('visible');
      result.classList.add('visible');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const uid = uidInput.value.trim();
      if (!uid) {
        showError('请输入 UID。');
        return;
      }

      button.disabled = true;
      try {
        const resp = await fetch(`/local/account-admin/users?uid=${encodeURIComponent(uid)}`, {
          headers: { Accept: 'application/json' },
        });
        const payload = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          showError(payload.error || `查询失败：HTTP ${resp.status}`);
          return;
        }
        render(payload);
      } catch (err) {
        showError(err && err.message ? err.message : '查询失败。');
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
