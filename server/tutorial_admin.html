<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CatsCo 示例任务管理</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111217;
      --panel: #1b1b22;
      --panel-2: #22232b;
      --border: #343640;
      --text: #f5f7fb;
      --muted: #9aa4b2;
      --primary: #10b981;
      --primary-2: #059669;
      --danger: #ef4444;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.14), transparent 32rem), var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button:disabled { cursor: not-allowed; opacity: 0.58; }

    .primary { background: var(--primary); color: #07130f; }
    .danger { background: rgba(239, 68, 68, 0.14); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.35); }
    .ghost { border: 1px solid var(--border); background: transparent; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(27, 27, 34, 0.86);
      margin-bottom: 16px;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .status.ok { color: #86efac; }
    .status.err { color: #fca5a5; }
    .status.busy { color: #fde68a; }

    .task-list {
      display: grid;
      gap: 16px;
    }

    .task {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(27, 27, 34, 0.94);
      overflow: hidden;
    }

    .task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .task-index {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .task-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="text"],
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #12131a;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 92px;
      line-height: 1.55;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: rgba(16, 185, 129, 0.75);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    }

    .files {
      display: grid;
      gap: 10px;
    }

    .file-row {
      display: grid;
      grid-template-columns: minmax(160px, 0.8fr) minmax(240px, 1.2fr) auto;
      gap: 8px;
      align-items: center;
    }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="file"] {
      max-width: 100%;
      color: var(--muted);
    }

    .empty {
      padding: 34px 20px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      header,
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-actions,
      .task-head {
        justify-content: flex-start;
      }

      .file-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>CatsCo 示例任务管理</h1>
        <p>这里仅用于维护用户聊天空状态和头像菜单里的教程任务。请通过 SSH 隧道访问。</p>
      </div>
      <button class="ghost" id="reloadBtn" type="button">重新读取</button>
    </header>

    <section class="toolbar">
      <div>
        <strong>任务结构</strong>
        <p>每个任务只保留标题、教程介绍、可选示例文件、可载入输入栏的 prompt。</p>
      </div>
      <div class="toolbar-actions">
        <button id="addBtn" type="button">添加任务</button>
        <button class="primary" id="saveBtn" type="button">保存修改</button>
      </div>
    </section>

    <div id="status" class="status">正在读取...</div>
    <section id="tasks" class="task-list"></section>
  </main>

  <script>
    const MAX_TASKS = 12;
    const state = {
      tasks: [],
      saving: false,
      uploading: false,
    };

    const tasksEl = document.getElementById('tasks');
    const statusEl = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    const addBtn = document.getElementById('addBtn');
    const reloadBtn = document.getElementById('reloadBtn');

    function setStatus(text, tone) {
      statusEl.textContent = text || '';
      statusEl.className = `status ${tone || ''}`.trim();
    }

    function setBusy(next) {
      state.saving = next;
      saveBtn.disabled = next || state.uploading;
      addBtn.disabled = next || state.uploading || state.tasks.length >= MAX_TASKS;
      reloadBtn.disabled = next || state.uploading;
    }

    function normalizeTask(task, index) {
      return {
        id: String(task && task.id ? task.id : `tutorial-task-${index + 1}`),
        title: String(task && task.title ? task.title : ''),
        intro: String(task && (task.intro || task.detail || task.description) ? (task.intro || task.detail || task.description) : ''),
        files: Array.isArray(task && task.files) ? task.files.map(normalizeFile).filter(Boolean) : legacyFiles(task),
        prompt: String(task && task.prompt ? task.prompt : ''),
      };
    }

    function normalizeFile(file) {
      if (!file) return null;
      const name = String(file.name || '').trim();
      const url = String(file.url || '').trim();
      return name && url ? { name, url } : null;
    }

    function legacyFiles(task) {
      if (!task || !task.mediaName || !task.mediaUrl) return [];
      return [{ name: String(task.mediaName), url: String(task.mediaUrl) }];
    }

    function emptyTask() {
      return {
        id: `tutorial-task-${Date.now()}`,
        title: '',
        intro: '',
        files: [],
        prompt: '',
      };
    }

    function render() {
      setBusy(state.saving || state.uploading);
      if (!state.tasks.length) {
        tasksEl.innerHTML = '<div class="empty">还没有示例任务。点击“添加任务”创建第一条。</div>';
        return;
      }

      tasksEl.innerHTML = state.tasks.map((task, index) => `
        <article class="task" data-index="${index}">
          <div class="task-head">
            <span class="task-index">任务 ${index + 1}</span>
            <button class="danger" type="button" data-action="delete" data-index="${index}">删除</button>
          </div>
          <div class="task-body">
            <div class="field">
              <label>标题</label>
              <input type="text" data-field="title" data-index="${index}" value="${escapeAttr(task.title)}" placeholder="例如：读图提取信息" />
            </div>
            <div class="field">
              <label>任务教程介绍</label>
              <textarea data-field="intro" data-index="${index}" placeholder="告诉用户这个任务会做什么。">${escapeHTML(task.intro)}</textarea>
            </div>
            <div class="field">
              <label>示例需要使用的文件（可选，可多个）</label>
              <div class="files">
                ${renderFiles(task, index)}
              </div>
              <div class="upload-row">
                <input type="file" multiple data-action="upload" data-index="${index}" />
                <span>上传后会自动加入当前任务，也可以手动填写文件名和 URL。</span>
              </div>
            </div>
            <div class="field">
              <label>供直接载入输入栏的 prompt</label>
              <textarea data-field="prompt" data-index="${index}" placeholder="用户点击“填入任务”后，会把这段文字放入聊天输入栏。">${escapeHTML(task.prompt)}</textarea>
            </div>
          </div>
        </article>
      `).join('');
    }

    function renderFiles(task, taskIndex) {
      if (!task.files.length) {
        return '<p>暂无示例文件。</p>';
      }
      return task.files.map((file, fileIndex) => `
        <div class="file-row">
          <input type="text" data-field="fileName" data-index="${taskIndex}" data-file-index="${fileIndex}" value="${escapeAttr(file.name)}" placeholder="文件名" />
          <input type="text" data-field="fileUrl" data-index="${taskIndex}" data-file-index="${fileIndex}" value="${escapeAttr(file.url)}" placeholder="文件 URL" />
          <button class="ghost" type="button" data-action="remove-file" data-index="${taskIndex}" data-file-index="${fileIndex}">移除</button>
        </div>
      `).join('');
    }

    async function loadTasks() {
      setStatus('正在读取...', 'busy');
      setBusy(true);
      try {
        const data = await requestJSON('/local/tutorial-admin/tasks');
        state.tasks = (Array.isArray(data.tasks) ? data.tasks : []).map(normalizeTask);
        setStatus(`已读取 ${state.tasks.length} 个任务`, 'ok');
      } catch (error) {
        setStatus(error.message || '读取失败', 'err');
      } finally {
        setBusy(false);
        render();
      }
    }

    async function saveTasks() {
      syncFromDOM();
      const invalid = state.tasks.findIndex((task) => !task.title.trim() || !task.prompt.trim());
      if (invalid >= 0) {
        setStatus(`任务 ${invalid + 1} 缺少标题或 prompt`, 'err');
        return;
      }
      setStatus('正在保存...', 'busy');
      setBusy(true);
      try {
        const data = await requestJSON('/local/tutorial-admin/tasks', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tasks: state.tasks }),
        });
        state.tasks = (Array.isArray(data.tasks) ? data.tasks : []).map(normalizeTask);
        setStatus('已保存修改', 'ok');
      } catch (error) {
        setStatus(error.message || '保存失败', 'err');
      } finally {
        setBusy(false);
        render();
      }
    }

    async function uploadFiles(taskIndex, files) {
      if (!files || !files.length) return;
      state.uploading = true;
      setBusy(true);
      setStatus(`正在上传 ${files.length} 个文件...`, 'busy');
      try {
        for (const file of files) {
          const form = new FormData();
          form.append('file', file);
          const result = await requestJSON('/local/tutorial-admin/upload', {
            method: 'POST',
            body: form,
          });
          if (result.file && result.file.name && result.file.url) {
            state.tasks[taskIndex].files.push(result.file);
          }
        }
        setStatus('上传完成，记得保存修改', 'ok');
      } catch (error) {
        setStatus(error.message || '上传失败', 'err');
      } finally {
        state.uploading = false;
        setBusy(false);
        render();
      }
    }

    async function requestJSON(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      let data = {};
      if (text) {
        try {
          data = JSON.parse(text);
        } catch (error) {
          throw new Error(`服务器返回了无法解析的内容（HTTP ${response.status}）`);
        }
      }
      if (!response.ok) {
        throw new Error(data.error || `请求失败（HTTP ${response.status}）`);
      }
      return data;
    }

    function syncFromDOM() {
      document.querySelectorAll('[data-field]').forEach((el) => {
        const index = Number(el.dataset.index);
        const task = state.tasks[index];
        if (!task) return;
        if (el.dataset.field === 'title') task.title = el.value;
        if (el.dataset.field === 'intro') task.intro = el.value;
        if (el.dataset.field === 'prompt') task.prompt = el.value;
        if (el.dataset.field === 'fileName') {
          const file = task.files[Number(el.dataset.fileIndex)];
          if (file) file.name = el.value;
        }
        if (el.dataset.field === 'fileUrl') {
          const file = task.files[Number(el.dataset.fileIndex)];
          if (file) file.url = el.value;
        }
      });
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/"/g, '&quot;');
    }

    tasksEl.addEventListener('input', (event) => {
      if (event.target.matches('[data-field]')) {
        syncFromDOM();
      }
    });

    tasksEl.addEventListener('click', (event) => {
      const target = event.target.closest('button[data-action]');
      if (!target) return;
      const index = Number(target.dataset.index);
      if (target.dataset.action === 'delete') {
        syncFromDOM();
        state.tasks.splice(index, 1);
        setStatus('已删除任务，记得保存修改', 'busy');
        render();
      }
      if (target.dataset.action === 'remove-file') {
        syncFromDOM();
        const fileIndex = Number(target.dataset.fileIndex);
        state.tasks[index].files.splice(fileIndex, 1);
        setStatus('已移除文件，记得保存修改', 'busy');
        render();
      }
    });

    tasksEl.addEventListener('change', (event) => {
      if (event.target.matches('input[type="file"][data-action="upload"]')) {
        const index = Number(event.target.dataset.index);
        uploadFiles(index, Array.from(event.target.files || []));
        event.target.value = '';
      }
    });

    addBtn.addEventListener('click', () => {
      syncFromDOM();
      if (state.tasks.length >= MAX_TASKS) {
        setStatus(`最多保留 ${MAX_TASKS} 个任务`, 'err');
        return;
      }
      state.tasks.push(emptyTask());
      setStatus('已添加任务，填写后保存', 'busy');
      render();
    });

    saveBtn.addEventListener('click', saveTasks);
    reloadBtn.addEventListener('click', loadTasks);
    loadTasks();
  </script>
</body>
</html>
