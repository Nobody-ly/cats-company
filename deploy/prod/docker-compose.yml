services:
  server:
    image: "${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/cats-company-server:${IMAGE_TAG}"
    restart: unless-stopped
    environment:
      OC_DB_DRIVER: "${OC_DB_DRIVER:-mysql}"
      OC_DB_DSN: "${OC_DB_DSN:?OC_DB_DSN is required}"
      OC_DB_MAX_OPEN_CONNS: "${OC_DB_MAX_OPEN_CONNS:-}"
      OC_DB_MAX_IDLE_CONNS: "${OC_DB_MAX_IDLE_CONNS:-}"
      OC_DB_CONN_MAX_LIFETIME: "${OC_DB_CONN_MAX_LIFETIME:-}"
      OC_DB_CONN_MAX_IDLE_TIME: "${OC_DB_CONN_MAX_IDLE_TIME:-}"
      OC_RUNTIME_STORE: "${OC_RUNTIME_STORE:-}"
      OC_REDIS_URL: "${OC_REDIS_URL:-}"
      OC_REDIS_KEY_PREFIX: "${OC_REDIS_KEY_PREFIX:-}"
      CATSCO_NODE_ID: "${CATSCO_NODE_ID:-}"
      OC_JWT_SECRET: "${OC_JWT_SECRET}"
      CATSCO_DEVICE_CONNECTOR_VERSION: "${CATSCO_DEVICE_CONNECTOR_VERSION:-}"
      CATSCO_DEVICE_CONNECTOR_RELEASE_BASE_URL: "${CATSCO_DEVICE_CONNECTOR_RELEASE_BASE_URL:-}"
      ADVANCED_READER_INTERNAL_URL: "${ADVANCED_READER_INTERNAL_URL:-}"
      ADVANCED_READER_CLIENT_ID: "${ADVANCED_READER_CLIENT_ID:-}"
      ADVANCED_READER_CLIENT_SECRET: "${ADVANCED_READER_CLIENT_SECRET:-}"
      ADVANCED_READER_CLIENT_SECRET_FILE: "${ADVANCED_READER_CLIENT_SECRET_FILE:-}"
      ADVANCED_READER_SIGNING_PATH: "${ADVANCED_READER_SIGNING_PATH:-/analyze}"
      ADVANCED_READER_INTERNAL_TIMEOUT_SECONDS: "${ADVANCED_READER_INTERNAL_TIMEOUT_SECONDS:-300}"
      ADVANCED_READER_PROXY_MAX_BODY_BYTES: "${ADVANCED_READER_PROXY_MAX_BODY_BYTES:-104857600}"
      TENCENTCLOUD_SECRET_ID: "${TENCENTCLOUD_SECRET_ID:-}"
      TENCENTCLOUD_SECRET_KEY: "${TENCENTCLOUD_SECRET_KEY:-}"
      TENCENTCLOUD_REGION: "${TENCENTCLOUD_REGION:-ap-guangzhou}"
      TENCENT_SES_FROM_EMAIL: "${TENCENT_SES_FROM_EMAIL:-}"
      TENCENT_SES_FROM_NAME: "${TENCENT_SES_FROM_NAME:-Cats Company}"
      TENCENT_SES_TEMPLATE_ID: "${TENCENT_SES_TEMPLATE_ID:-}"
      TENCENT_SES_SUBJECT: "${TENCENT_SES_SUBJECT:-Cats Company 注册验证码}"
      TENCENT_SES_REPLY_TO: "${TENCENT_SES_REPLY_TO:-}"
      FEISHU_WEBHOOK_URL: "${FEISHU_WEBHOOK_URL:-}"
      FEISHU_KEYWORD: "${FEISHU_KEYWORD:-cats-company}"
      FEEDBACK_FEISHU_WEBHOOK_URL: "${FEEDBACK_FEISHU_WEBHOOK_URL:-}"
      FEEDBACK_FEISHU_KEYWORD: "${FEEDBACK_FEISHU_KEYWORD:-}"
      FEEDBACK_PUBLIC_BASE_URL: "${FEEDBACK_PUBLIC_BASE_URL:-https://app.catsco.cc}"
      CATSCO_PUBLIC_BASE_URL: "${CATSCO_PUBLIC_BASE_URL:-https://app.catsco.cc}"
      CATSCO_PUBLIC_WS_URL: "${CATSCO_PUBLIC_WS_URL:-wss://app.catsco.cc/v0/channels}"
      CATSCO_FEISHU_APP_ID: "${CATSCO_FEISHU_APP_ID:-}"
      CATSCO_FEISHU_APP_SECRET: "${CATSCO_FEISHU_APP_SECRET:-}"
      CATSCO_FEISHU_ENTRY_URL_TEMPLATE: "${CATSCO_FEISHU_ENTRY_URL_TEMPLATE:-}"
      CATSCO_FEISHU_OAUTH_REDIRECT_URI: "${CATSCO_FEISHU_OAUTH_REDIRECT_URI:-}"
      CATSCO_FEISHU_EVENT_VERIFICATION_TOKEN: "${CATSCO_FEISHU_EVENT_VERIFICATION_TOKEN:-}"
      CATSCO_FEISHU_OAUTH_STATE_SECRET: "${CATSCO_FEISHU_OAUTH_STATE_SECRET:-}"
      CATSCO_CHANNEL_BINDING_TOKEN: "${CATSCO_CHANNEL_BINDING_TOKEN:-}"
      CATSCO_WEIXIN_APP_ID: "${CATSCO_WEIXIN_APP_ID:-}"
      CATSCO_WEIXIN_APP_SECRET: "${CATSCO_WEIXIN_APP_SECRET:-}"
      CATSCO_WEIXIN_EVENT_TOKEN: "${CATSCO_WEIXIN_EVENT_TOKEN:-}"
      CATSCO_WEIXIN_API_BASE_URL: "${CATSCO_WEIXIN_API_BASE_URL:-}"
      CATSCO_WEIXIN_QR_SHOW_BASE_URL: "${CATSCO_WEIXIN_QR_SHOW_BASE_URL:-}"
      CATSCO_WEIXIN_CLAWBOT_ILINK_BASE_URL: "${CATSCO_WEIXIN_CLAWBOT_ILINK_BASE_URL:-}"
      CATSCO_WEIXIN_CLAWBOT_BOT_TYPE: "${CATSCO_WEIXIN_CLAWBOT_BOT_TYPE:-}"
      CATSCO_WEIXIN_CLAWBOT_QR_TIMEOUT_SECONDS: "${CATSCO_WEIXIN_CLAWBOT_QR_TIMEOUT_SECONDS:-}"
      CATSCO_WEIXIN_CLAWBOT_WORKER_ENABLED: "${CATSCO_WEIXIN_CLAWBOT_WORKER_ENABLED:-}"
      CATSCO_WEIXIN_CLAWBOT_WORKER_REFRESH_SECONDS: "${CATSCO_WEIXIN_CLAWBOT_WORKER_REFRESH_SECONDS:-}"
      CATSCO_WEIXIN_CLAWBOT_LONGPOLL_SECONDS: "${CATSCO_WEIXIN_CLAWBOT_LONGPOLL_SECONDS:-}"
      CATS_RELAY_ADMIN_URL: "${CATS_RELAY_ADMIN_URL:-}"
      CATS_RELAY_ADMIN_TOKEN: "${CATS_RELAY_ADMIN_TOKEN:-}"
      CATS_RELAY_ADMIN_TIMEOUT_SECONDS: "${CATS_RELAY_ADMIN_TIMEOUT_SECONDS:-15}"
      CATS_RELAY_PUBLIC_BASE_URL: "${CATS_RELAY_PUBLIC_BASE_URL:-https://relay.catsco.cc}"
      CATS_RELAY_OPENAI_BASE_URL: "${CATS_RELAY_OPENAI_BASE_URL:-https://relay.catsco.cc/v1}"
      CATS_RELAY_ANTHROPIC_BASE_URL: "${CATS_RELAY_ANTHROPIC_BASE_URL:-https://relay.catsco.cc/anthropic}"
      CATS_RELAY_DEFAULT_MODEL: "${CATS_RELAY_DEFAULT_MODEL:-MiniMax-M2.7}"
      CATS_RELAY_DOCS_URL: "${CATS_RELAY_DOCS_URL:-https://relay.catsco.cc}"
      CATS_RELAY_SSO_SECRET: "${CATS_RELAY_SSO_SECRET:-}"
      CATS_RELAY_COMMERCIAL_ENABLED: "${CATS_RELAY_COMMERCIAL_ENABLED:-0}"
      CATS_RELAY_COMMERCIAL_TEST_UIDS: "${CATS_RELAY_COMMERCIAL_TEST_UIDS:-}"
      CATS_RELAY_COMMERCIAL_ENFORCE_ENABLED: "${CATS_RELAY_COMMERCIAL_ENFORCE_ENABLED:-0}"
      CATS_RELAY_COMMERCIAL_ENFORCE_UIDS: "${CATS_RELAY_COMMERCIAL_ENFORCE_UIDS:-}"
      APP_ENV: production
      TZ: Asia/Shanghai
    ports:
      - "${PROD_API_BIND_HOST:-127.0.0.1}:${PROD_API_HOST_PORT:-26061}:6061"
      - "${PROD_GRPC_BIND_HOST:-127.0.0.1}:${PROD_GRPC_HOST_PORT:-26062}:6062"
    volumes:
      - "${PROD_STACK_ROOT}/data/uploads:/app/uploads"
      - "${PROD_STACK_ROOT}/compose/tinode.prod.conf:/app/tinode.conf:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6061/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - prodnet

  web:
    image: "${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/cats-company-web:${IMAGE_TAG}"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${PROD_WEB_BIND_HOST:-127.0.0.1}:${PROD_WEB_HOST_PORT:-28080}:80"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && test -s /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - prodnet

networks:
  prodnet:
    name: catscompany_prod_net
