server {
    listen 80;
    listen [::]:80;
    server_name catsco.cc www.catsco.cc;
    return 301 https://app.catsco.cc$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.catsco.cc;
    return 301 https://app.catsco.cc$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.catsco.cc;

    ssl_certificate /etc/letsencrypt/live/app.catsco.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.catsco.cc/privkey.pem;

    client_max_body_size 300M;

    location = /h5 {
        return 301 /h5/;
    }

    location /h5/ {
        alias /var/www/html/h5/;
        try_files $uri $uri/ /h5/index.html;
    }

    location = /local {
        return 404;
    }

    location ^~ /local/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v0/channels {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location = /api.html {
        proxy_pass http://127.0.0.1:28080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-cache";
    }

    location /static/ {
        proxy_pass http://127.0.0.1:28080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:28080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-cache";
    }
}
