name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: cats-company-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate-docker:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: cats_test
          POSTGRES_USER: catsco
          POSTGRES_PASSWORD: catsco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U catsco -d cats_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Test backend
        run: go test ./server/...

      - name: Test PostgreSQL store contract
        env:
          CATS_PG_TEST_DSN: postgres://catsco:catsco_test@127.0.0.1:5432/cats_test?sslmode=disable
        run: go test ./server/db/postgres -run TestPostgresStoreContract -count=1 -v

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Test webapp
        working-directory: webapp
        run: npm test -- --watchAll=false --runInBand

      - name: Build webapp
        working-directory: webapp
        run: npm run build

      - name: Validate test compose
        run: docker compose -f deploy/test/docker-compose.yml --env-file deploy/test/env.test.example config

      - name: Validate PostgreSQL test compose
        run: docker compose -f deploy/test/docker-compose.yml --env-file deploy/test/env.test.postgres.example config

      - name: Validate prod compose
        run: docker compose -f deploy/prod/docker-compose.yml --env-file deploy/prod/env.prod.example config

      - name: Build server image
        run: docker build -f deploy/Dockerfile.server -t cats-company-server-ci .

      - name: Build web image
        run: docker build -f deploy/Dockerfile.nginx --build-arg REACT_APP_API_BASE= -t cats-company-web-ci .
