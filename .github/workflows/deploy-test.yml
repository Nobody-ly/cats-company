name: Deploy Docker Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cats-company-deploy-test
  cancel-in-progress: true

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    env:
      TEST_STACK_ROOT: /srv/catscompany-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cats-company-server:${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.nginx
          push: true
          build-args: |
            REACT_APP_API_BASE=
          tags: ghcr.io/${{ github.repository_owner }}/cats-company-web:${{ github.sha }}

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload test stack files
        timeout-minutes: 8
        run: |
          SSH_OPTS="-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          REMOTE="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p ${TEST_STACK_ROOT}/compose ${TEST_STACK_ROOT}/env ${TEST_STACK_ROOT}/data/mysql ${TEST_STACK_ROOT}/data/uploads ${TEST_STACK_ROOT}/logs ${TEST_STACK_ROOT}/releases /usr/local/bin"

          tmpdir="$(mktemp -d)"
          mkdir -p "${tmpdir}/compose" "${tmpdir}/env"
          cp deploy/test/bootstrap-server.sh "${tmpdir}/compose/"
          cp deploy/test/remote-deploy.sh "${tmpdir}/compose/"
          cp deploy/test/remote-status.sh "${tmpdir}/compose/"
          cp deploy/test/docker-compose.yml "${tmpdir}/compose/"
          cp deploy/test/tinode.test.conf "${tmpdir}/compose/"
          cp deploy/init-db.sh "${tmpdir}/compose/"
          cp deploy/test/env.test.example "${tmpdir}/env/"
          cp deploy/test/env.test.postgres.example "${tmpdir}/env/"
          tar -C "${tmpdir}" -czf test-stack-files.tar.gz .
          rm -rf "${tmpdir}"
          git archive --format=tar.gz --output "cats-company-source-${{ github.sha }}.tar.gz" HEAD

          ssh ${SSH_OPTS} "${REMOTE}" "tar -xzf - -C ${TEST_STACK_ROOT}" < test-stack-files.tar.gz
          ssh ${SSH_OPTS} "${REMOTE}" "cat > ${TEST_STACK_ROOT}/releases/cats-company-source-${{ github.sha }}.tar.gz" < "cats-company-source-${{ github.sha }}.tar.gz"

      - name: Deploy isolated test stack
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "GITHUB_SHA=${GITHUB_SHA} TEST_STACK_ROOT=${TEST_STACK_ROOT} GHCR_OWNER=${{ github.repository_owner }} GHCR_USERNAME=${GHCR_USERNAME} GHCR_TOKEN=${GHCR_TOKEN} bash -s" <<'EOF'
          set -euo pipefail

          root="${TEST_STACK_ROOT}"
          revision="${GITHUB_SHA}"
          owner="${GHCR_OWNER}"
          source_root="$root/source/$revision"
          chmod +x "$root/compose/bootstrap-server.sh" "$root/compose/remote-deploy.sh" "$root/compose/remote-status.sh"
          "$root/compose/bootstrap-server.sh" "$root"

          source_bundle="$root/releases/cats-company-source-${revision}.tar.gz"
          if [ ! -f "$source_bundle" ]; then
            echo "missing source bundle: $source_bundle" >&2
            exit 1
          fi
          rm -rf "$source_root"
          mkdir -p "$source_root"
          tar -xzf "$source_bundle" -C "$source_root"
          cd "$source_root"
          docker build \
            --build-arg GOPROXY="${REMOTE_GOPROXY:-https://goproxy.cn,direct}" \
            -f deploy/Dockerfile.server \
            -t "ghcr.io/${owner}/cats-company-server:${revision}" \
            .

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null
          fi
          timeout 300 docker pull "ghcr.io/${owner}/cats-company-web:${revision}"
          find "$root/source" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +

          export SKIP_IMAGE_PULL=1
          "$root/compose/remote-deploy.sh" "$root" "$revision"
          "$root/compose/remote-status.sh" "$root"
          EOF

      - name: Dump remote status on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "bash ${TEST_STACK_ROOT}/compose/remote-status.sh ${TEST_STACK_ROOT} || true"
