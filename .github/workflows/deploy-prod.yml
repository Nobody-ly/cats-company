name: Deploy Docker Prod

on:
  workflow_run:
    workflows: ["Deploy Docker Test"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: cats-company-deploy-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment: prod
    env:
      PROD_STACK_ROOT: /srv/catscompany-prod
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload prod stack files
        timeout-minutes: 8
        run: |
          SSH_OPTS="-o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          REMOTE="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          ssh ${SSH_OPTS} "${REMOTE}" "mkdir -p ${PROD_STACK_ROOT}/compose ${PROD_STACK_ROOT}/env ${PROD_STACK_ROOT}/data/uploads ${PROD_STACK_ROOT}/logs ${PROD_STACK_ROOT}/releases /usr/local/bin"

          tmpdir="$(mktemp -d)"
          mkdir -p "${tmpdir}/compose" "${tmpdir}/env"
          cp deploy/prod/bootstrap-server.sh "${tmpdir}/compose/"
          cp deploy/prod/remote-deploy.sh "${tmpdir}/compose/"
          cp deploy/prod/remote-rollback.sh "${tmpdir}/compose/"
          cp deploy/prod/remote-status.sh "${tmpdir}/compose/"
          cp deploy/prod/docker-compose.yml "${tmpdir}/compose/"
          cp deploy/prod/tinode.prod.conf "${tmpdir}/compose/"
          cp deploy/prod/env.prod.example "${tmpdir}/env/"
          tar -C "${tmpdir}" -czf prod-stack-files.tar.gz .
          rm -rf "${tmpdir}"

          ssh ${SSH_OPTS} "${REMOTE}" "tar -xzf - -C ${PROD_STACK_ROOT}" < prod-stack-files.tar.gz

      - name: Deploy prod stack
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "IMAGE_TAG=${IMAGE_TAG} PROD_STACK_ROOT=${PROD_STACK_ROOT} GHCR_OWNER=${{ github.repository_owner }} GHCR_USERNAME=${GHCR_USERNAME} GHCR_TOKEN=${GHCR_TOKEN} bash -s" <<'EOF'
          set -euo pipefail

          root="${PROD_STACK_ROOT}"
          revision="${IMAGE_TAG}"
          owner="${GHCR_OWNER}"
          source_root="$root/source/$revision"
          chmod +x "$root/compose/bootstrap-server.sh" "$root/compose/remote-deploy.sh" "$root/compose/remote-rollback.sh" "$root/compose/remote-status.sh"
          "$root/compose/bootstrap-server.sh" "$root"

          rm -rf "$source_root"
          mkdir -p "$root/source"
          git clone --depth 1 "https://github.com/${owner}/cats-company.git" "$source_root"
          cd "$source_root"
          git fetch --depth 1 origin "$revision"
          git checkout --detach "$revision"
          docker build \
            --build-arg GOPROXY="${REMOTE_GOPROXY:-https://goproxy.cn,direct}" \
            -f deploy/Dockerfile.server \
            -t "ghcr.io/${owner}/cats-company-server:${revision}" \
            .

          if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null
          fi
          timeout 300 docker pull "ghcr.io/${owner}/cats-company-web:${revision}"
          find "$root/source" -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +

          export SKIP_IMAGE_PULL=1
          "$root/compose/remote-deploy.sh" "$root" "$revision"
          "$root/compose/remote-status.sh" "$root"
          EOF

      - name: Roll back prod stack on failure
        if: failure()
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "GHCR_USERNAME=${GHCR_USERNAME} GHCR_TOKEN=${GHCR_TOKEN} bash ${PROD_STACK_ROOT}/compose/remote-rollback.sh ${PROD_STACK_ROOT} || true"

      - name: Dump prod status on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "bash ${PROD_STACK_ROOT}/compose/remote-status.sh ${PROD_STACK_ROOT} || true"
